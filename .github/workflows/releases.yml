name: Build & Release Obsidian Plugin

on:
  push:
    branches:
      - main
    tags:
      - "*"
  workflow_dispatch:
    inputs:
      version:
        description: "版本号（例如 v1.2.3）"
        required: true
        default: "1.7.1"

env:
  PLUGIN_NAME: flashcards

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Decide version
        id: version
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            RAW_TAG="${{ github.event.inputs.version }}"
          elif [[ "${{ github.ref_type }}" == "tag" ]]; then
            RAW_TAG="${GITHUB_REF#refs/tags/}"
          else
            # Push to main: auto-bump patch from manifest
            CURRENT=$(node -p "require('./manifest.json').version")
            MAJOR="${CURRENT%%.*}"
            MINOR_PATCH="${CURRENT#*.}"
            MINOR="${MINOR_PATCH%.*}"
            PATCH="${MINOR_PATCH##*.}"
            CLEAN_TAG="${MAJOR}.${MINOR}.$(( PATCH + 1 ))"
            echo "tag=$CLEAN_TAG" >> $GITHUB_OUTPUT
            exit 0
          fi
          # Strip leading v for clean semver
          CLEAN_TAG="${RAW_TAG#v}"
          echo "tag=$CLEAN_TAG" >> $GITHUB_OUTPUT

      - name: Update manifest.json version
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          echo "Setting version to $TAG"
          node -e "
            const m = require('./manifest.json');
            m.version = '$TAG';
            require('fs').writeFileSync('manifest.json', JSON.stringify(m, null, 2) + '\n');
          "
          echo "Updated manifest.json:"
          head -5 manifest.json

      - name: Install dependencies
        run: npm install 2>&1 | tee /tmp/npm-output.txt

      - name: Upload npm debug log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: npm-debug
          path: |
            /tmp/npm-output.txt
            /home/runner/.npm/_logs/*.log

      - name: Build with esbuild
        run: npx esbuild main.ts --bundle --external:obsidian --format=cjs --outfile=main.js --target=es2016 --minify

      - name: Package plugin
        run: |
          mkdir ${{ env.PLUGIN_NAME }}
          cp main.js manifest.json ${{ env.PLUGIN_NAME }}/
          zip -r ${{ env.PLUGIN_NAME }}.zip ${{ env.PLUGIN_NAME }}

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: ${{ steps.version.outputs.tag }}
          draft: false
          prerelease: false
          files: |
            ${{ env.PLUGIN_NAME }}.zip
            main.js
            manifest.json
          generate_release_notes: true
