name: Build & Release Obsidian Plugin

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "版本号（例如 v1.2.3）"
        required: true
        default: "v1.7.0"

env:
  PLUGIN_NAME: flashcards

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20.x"
          cache: "npm"

      - name: Decide version
        id: version
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "tag=${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
          else
            echo "tag=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
          fi

      - name: Update manifest.json version
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          VER="${TAG#v}"
          echo "Setting version to $VER"
          node -e "
            const m = require('./manifest.json');
            m.version = '$VER';
            require('fs').writeFileSync('manifest.json', JSON.stringify(m, null, 2) + '\n');
          "
          echo "Updated manifest.json:"
          head -5 manifest.json

      - name: Install dependencies
        run: npm install

      - name: Build with esbuild
        run: |
          npx esbuild main.ts --bundle --external:obsidian --format=cjs --outfile=main.js --target=es2016 --minify
          echo "Build done. main.js size:"
          ls -lh main.js

      - name: Package plugin
        run: |
          mkdir ${{ env.PLUGIN_NAME }}
          cp main.js manifest.json ${{ env.PLUGIN_NAME }}/
          zip -r ${{ env.PLUGIN_NAME }}.zip ${{ env.PLUGIN_NAME }}

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: ${{ steps.version.outputs.tag }}
          draft: false
          prerelease: false
          files: |
            ${{ env.PLUGIN_NAME }}.zip
            main.js
            manifest.json
          generate_release_notes: true
